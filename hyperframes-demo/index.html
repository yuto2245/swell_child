<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="vendor/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0b0b0f;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #title {
        position: absolute;
        top: 50%;
        left: 50%;
        font-size: 140px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.03em;
      }
      #subtitle {
        position: absolute;
        top: calc(50% + 110px);
        left: 50%;
        font-size: 32px;
        color: #9ca3af;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="5"
      data-width="1920"
      data-height="1080"
    >
      <div id="title" class="clip" data-start="0" data-duration="5" data-track-index="1">
        Hello, HyperFrames
      </div>
      <div id="subtitle" class="clip" data-start="0" data-duration="5" data-track-index="2">
        Rendered with Claude Code
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo(
        "#title",
        { xPercent: -50, yPercent: -50, opacity: 0, y: -40 },
        { xPercent: -50, yPercent: -50, opacity: 1, y: 0, duration: 1.2, ease: "power3.out" },
        0
      );
      tl.fromTo(
        "#subtitle",
        { xPercent: -50, opacity: 0, y: 20 },
        { xPercent: -50, opacity: 1, y: 0, duration: 1.0, ease: "power3.out" },
        0.4
      );
      tl.to("#title", { opacity: 0, y: -20, duration: 0.8, ease: "power2.in" }, 4.2);
      tl.to("#subtitle", { opacity: 0, y: 10, duration: 0.8, ease: "power2.in" }, 4.2);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
